<!DOCTYPE html>
<html lang="id">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keuangan Keluarga</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<div class="title">
<i class="fa-solid fa-wallet"></i>
<h2>Keuangan Keluarga</h2>
</div>

<div class="header-right">

<button onclick="toggleDark()">
<i class="fa-solid fa-moon"></i>
</button>

<button onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
</button>

</div>

</header>


<div class="container">

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card saldo">
<i class="fa-solid fa-coins"></i>
<div>
<p>Saldo</p>
<h2 id="saldo">Rp 0</h2>
</div>
</div>

<div class="card masuk">
<i class="fa-solid fa-arrow-down"></i>
<div>
<p>Pemasukan</p>
<h2 id="masuk">Rp 0</h2>
</div>
</div>

<div class="card keluar">
<i class="fa-solid fa-arrow-up"></i>
<div>
<p>Pengeluaran</p>
<h2 id="keluar">Rp 0</h2>
</div>
</div>

</div>


<!-- FORM -->

<div class="card form">

<h3>Tambah Transaksi</h3>

<input type="date" id="tanggal">

<select id="tipe">
<option>Pemasukan</option>
<option>Pengeluaran</option>
</select>

<select id="kategori"></select>

<input id="deskripsi" placeholder="Deskripsi">

<input id="jumlah" type="number" placeholder="Jumlah">

<button onclick="simpan()">
<i class="fa-solid fa-floppy-disk"></i> Simpan
</button>

</div>


<!-- FILTER -->

<div class="card filter">

<input type="month" id="filterBulan" onchange="filterBulan()">

<input placeholder="Search..." onkeyup="search(this.value)">

<button onclick="exportPDF()">
<i class="fa-solid fa-file-pdf"></i> Export
</button>

</div>


<!-- CHART -->

<div class="charts">

<div class="card">
<h3>Pemasukan Bulanan</h3>
<div class="chart-box">
<canvas id="chartPemasukan"></canvas>
</div>
</div>

<div class="card">
<h3>Pengeluaran Bulanan</h3>
<div class="chart-box">
<canvas id="chartPengeluaran"></canvas>
</div>
</div>

<div class="card full">
<h3>Perbandingan</h3>
<div class="chart-box">
<canvas id="chartPie"></canvas>
</div>
</div>

</div>


<!-- TABLE -->

<div class="card table-card">

<h3>Riwayat Transaksi</h3>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Tipe</th>
<th>Jumlah</th>
<th>User</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
