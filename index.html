<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Keuangan Keluarga</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h3>Keuangan Keluarga</h3>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="dashboard">

<div class="card">
<h3>Saldo</h3>
<h2 id="saldo">Rp 0</h2>
</div>

<div class="card">
<h3>Pemasukan</h3>
<h2 id="masuk">Rp 0</h2>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<h2 id="keluar">Rp 0</h2>
</div>

</div>

<div class="card" id="formTransaksi">

<h3>Tambah Transaksi</h3>

<input type="date" id="tanggal">

<select id="tipe">
<option>Pemasukan</option>
<option>Pengeluaran</option>
</select>

<select id="kategori"></select>

<input id="deskripsi" placeholder="Deskripsi">

<input id="jumlah" type="number" placeholder="Jumlah">

<button onclick="simpan()">Simpan</button>

</div>

<div class="card">

<input type="month" id="filterBulan" onchange="filterBulan()">

<input placeholder="Search..." onkeyup="search(this.value)">

<button onclick="exportPDF()">Export PDF</button>

</div>

<div class="dashboard-grid">

    <div class="card">
      <h3>Pemasukan Bulanan</h3>
      <canvas id="chartPemasukan"></canvas>
    </div>
  
    <div class="card">
      <h3>Pengeluaran Bulanan</h3>
      <canvas id="chartPengeluaran"></canvas>
    </div>
  
    <div class="card full">
      <h3>Perbandingan Pemasukan vs Pengeluaran</h3>
      <canvas id="chartPie"></canvas>
    </div>
  
  </div>

<div class="card">

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Tipe</th>
<th>Jumlah</th>
<th>User</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
